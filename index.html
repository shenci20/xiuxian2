﻿<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仙途情缘</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png"> 
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

:root {
  --bg-primary: #0a0a0a;
  --bg-secondary: #111111;
  --bg-card: #1a1a1a;
  --bg-hover: #222222;
  --border-color: #333333;
  --border-light: #444444;
  --text-primary: #e8e8e8;
  --text-secondary: #aaaaaa;
  --text-dim: #666666;
  --accent: #c8a882;
  --accent-dim: #8a7560;
  --danger: #8b4444;
  --success: #4a7a4a;
  --love: #9b4d6a;
}

* {
  margin: 0; padding: 0; box-sizing: border-box;
}

body {
  font-family: 'Noto Serif SC', 'SimSun', serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }

/* ===== API Config Screen ===== */
#apiScreen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.api-container {
  max-width: 560px;
  width: 100%;
}

.logo-section {
  text-align: center;
  margin-bottom: 48px;
}

.logo-title {
  font-size: 36px;
  font-weight: 300;
  letter-spacing: 12px;
  color: var(--text-primary);
  margin-bottom: 8px;
}

.logo-sub {
  font-size: 13px;
  color: var(--text-dim);
  letter-spacing: 4px;
}

.form-group {
  margin-bottom: 24px;
}

.form-label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  letter-spacing: 2px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 12px 16px;
  font-family: inherit;
  font-size: 14px;
  outline: none;
  transition: border-color 0.3s;
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent-dim);
}

.form-textarea {
  resize: vertical;
  min-height: 80px;
}

.form-select {
  appearance: none;
  cursor: pointer;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 32px;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
}

.btn:hover {
  background: var(--bg-hover);
  border-color: var(--accent-dim);
}

.btn-primary {
  border-color: var(--accent-dim);
  background: rgba(200, 168, 130, 0.08);
}

.btn-primary:hover {
  background: rgba(200, 168, 130, 0.15);
}

.btn-sm {
  padding: 6px 16px;
  font-size: 12px;
}

.btn-danger {
  border-color: var(--danger);
  color: #cc6666;
}

.btn-block { width: 100%; }

.btn-group {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.saved-configs {
  margin-top: 32px;
  border-top: 1px solid var(--border-color);
  padding-top: 24px;
}

.config-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border: 1px solid var(--border-color);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.3s;
}

.config-item:hover {
  border-color: var(--accent-dim);
  background: var(--bg-hover);
}

.config-item .name {
  font-size: 14px;
}

.config-item .meta {
  font-size: 11px;
  color: var(--text-dim);
}

.model-list {
  max-height: 200px;
  overflow-y: auto;
  border: 1px solid var(--border-color);
  margin-top: 8px;
}

.model-item {
  padding: 8px 16px;
  cursor: pointer;
  font-size: 13px;
  border-bottom: 1px solid var(--border-color);
  transition: background 0.2s;
}

.model-item:hover, .model-item.selected {
  background: var(--bg-hover);
  color: var(--accent);
}

.model-item:last-child { border-bottom: none; }

/* ===== Character Creation Screen ===== */
#createScreen {
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;
}

.create-container {
  max-width: 640px;
  width: 100%;
}

.section-title {
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 4px;
  color: var(--accent);
  margin-bottom: 24px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border-color);
}

.section-block {
  margin-bottom: 40px;
}

.avatar-upload {
  width: 120px;
  height: 120px;
  border: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  overflow: hidden;
  margin: 0 auto 16px;
  transition: border-color 0.3s;
  position: relative;
}

.avatar-upload:hover {
  border-color: var(--accent-dim);
}

.avatar-upload img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.avatar-upload .placeholder {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  letter-spacing: 1px;
}

.radio-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.radio-btn {
  padding: 8px 20px;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.3s;
}

.radio-btn.active {
  border-color: var(--accent-dim);
  color: var(--accent);
  background: rgba(200, 168, 130, 0.08);
}

.radio-btn:hover {
  border-color: var(--accent-dim);
}

.tag-group {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tag-btn {
  padding: 6px 14px;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.3s;
}

.tag-btn.active {
  border-color: var(--accent-dim);
  color: var(--accent);
  background: rgba(200, 168, 130, 0.08);
}

.confirm-card {
  border: 1px solid var(--border-color);
  padding: 24px;
  margin: 24px 0;
}

.confirm-card .row {
  display: flex;
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid rgba(51,51,51,0.5);
}

.confirm-card .row:last-child { border-bottom: none; }

.confirm-card .label {
  width: 100px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.confirm-card .value {
  color: var(--text-primary);
}

/* ===== Game Main Screen ===== */
#gameScreen {
  flex-direction: column;
  height: 100vh;
}

.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-avatar {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border-color);
  overflow: hidden;
}

.header-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.header-info .name {
  font-size: 14px;
}

.header-info .realm {
  font-size: 11px;
  color: var(--text-dim);
}

.header-right {
  display: flex;
  gap: 8px;
}

.icon-btn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.3s;
}

.icon-btn:hover {
  border-color: var(--accent-dim);
  color: var(--accent);
}

.game-body {
  flex: 1;
  display: flex;
  overflow: hidden;
}

.main-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.story-area {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

.story-entry {
  margin-bottom: 24px;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.story-narration {
  font-size: 14px;
  line-height: 2;
  color: var(--text-primary);
  text-align: justify;
}

.story-dialogue {
  font-size: 14px;
  line-height: 1.8;
  padding: 12px 16px;
  border-left: 2px solid var(--accent-dim);
  margin: 12px 0;
  color: var(--text-primary);
}

.story-dialogue .speaker {
  color: var(--accent);
  font-size: 12px;
  margin-bottom: 4px;
}

.story-system {
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  padding: 8px;
  border: 1px dashed var(--border-color);
  margin: 12px 0;
}

.story-entry-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  opacity: 0;
  transition: opacity 0.3s;
}

.story-entry:hover .story-entry-actions,
.story-entry.actions-visible .story-entry-actions {
  opacity: 1;
}

.entry-action-btn {
  font-size: 11px;
  color: var(--text-dim);
  background: none;
  border: 1px solid transparent;
  cursor: pointer;
  font-family: inherit;
  padding: 3px 8px;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.entry-action-btn:hover {
  color: var(--accent);
  border-color: var(--border-color);
}

/* 双击编辑模式 */
.story-entry .edit-textarea {
  width: 100%;
  background: var(--bg-secondary);
  border: 1px solid var(--accent-dim);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  line-height: 2;
  padding: 12px;
  resize: vertical;
  min-height: 100px;
  outline: none;
}

.story-entry .edit-actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  justify-content: flex-end;
}

.choices-area {
  padding: 16px 24px;
  border-top: 1px solid var(--border-color);
  flex-shrink: 0;
}

.choice-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 10px 16px;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-primary);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 8px;
  transition: all 0.3s;
}

.choice-btn:hover {
  border-color: var(--accent-dim);
  background: rgba(200, 168, 130, 0.05);
}

.choice-btn:last-child { margin-bottom: 0; }

.input-area {
  display: flex;
  gap: 8px;
  padding: 16px 24px;
  border-top: 1px solid var(--border-color);
  flex-shrink: 0;
}

.input-area input {
  flex: 1;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 10px 16px;
  font-family: inherit;
  font-size: 13px;
  outline: none;
}

.input-area input:focus {
  border-color: var(--accent-dim);
}

/* ===== Side Panels ===== */
.side-panel {
  position: fixed;
  top: 0;
  right: -400px;
  width: 400px;
  height: 100vh;
  background: var(--bg-primary);
  border-left: 1px solid var(--border-color);
  z-index: 100;
  transition: right 0.3s ease;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.side-panel.open {
  right: 0;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}

.panel-title {
  font-size: 14px;
  letter-spacing: 2px;
}

.panel-close {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 18px;
}

.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

/* Status Panel */
.status-section {
  margin-bottom: 24px;
}

.status-section h4 {
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 12px;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid rgba(51,51,51,0.3);
}

.stat-row .stat-label { color: var(--text-secondary); }
.stat-row .stat-value { color: var(--text-primary); }

.bar-stat {
  margin-bottom: 12px;
}

.bar-stat .bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-bottom: 4px;
}

.bar-stat .bar-label .name { color: var(--text-secondary); }
.bar-stat .bar-label .val { color: var(--text-dim); }

.bar-track {
  height: 3px;
  background: var(--bg-secondary);
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--accent-dim);
  transition: width 0.5s;
}

/* NPC Panel */
.npc-list-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border: 1px solid var(--border-color);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.3s;
}

.npc-list-item:hover {
  border-color: var(--accent-dim);
  background: var(--bg-hover);
}

.npc-avatar {
  width: 48px;
  height: 48px;
  border: 1px solid var(--border-color);
  overflow: hidden;
  flex-shrink: 0;
}

.npc-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.npc-brief .npc-name {
  font-size: 14px;
  margin-bottom: 2px;
}

.npc-brief .npc-relation {
  font-size: 11px;
  color: var(--text-dim);
}

.npc-brief .npc-favor {
  font-size: 11px;
  color: var(--accent-dim);
}

/* NPC Detail / Chat */
.npc-detail-header {
  text-align: center;
  padding: 20px;
  border-bottom: 1px solid var(--border-color);
}

.npc-detail-avatar {
  width: 80px;
  height: 80px;
  border: 1px solid var(--border-color);
  overflow: hidden;
  margin: 0 auto 12px;
}

.npc-detail-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.npc-detail-name {
  font-size: 18px;
  margin-bottom: 4px;
}

.npc-detail-title {
  font-size: 12px;
  color: var(--text-dim);
}

.npc-stats {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-color);
}

.npc-chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.chat-msg {
  margin-bottom: 16px;
  display: flex;
  gap: 8px;
}

.chat-msg.from-player {
  flex-direction: row-reverse;
}

.chat-bubble {
  max-width: 75%;
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.7;
}

.chat-msg.from-npc .chat-bubble {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
}

.chat-msg.from-player .chat-bubble {
  background: rgba(200, 168, 130, 0.1);
  border: 1px solid var(--accent-dim);
}

.chat-avatar-sm {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border-color);
  overflow: hidden;
  flex-shrink: 0;
}

.chat-avatar-sm img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.chat-input-area {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border-color);
}

.chat-input-area input {
  flex: 1;
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 8px 12px;
  font-family: inherit;
  font-size: 13px;
  outline: none;
}

.chat-actions {
  display: flex;
  gap: 4px;
  padding: 4px 16px;
  border-top: 1px solid var(--border-color);
}

/* Overlay */
.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 99;
}

.overlay.open { display: block; }

/* Settings Panel */
.setting-item {
  margin-bottom: 20px;
}

.setting-item label {
  display: block;
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 6px;
  letter-spacing: 1px;
}

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 200;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.7);
}

.modal.open {
  display: flex;
}

.modal-content {
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  width: 90%;
  max-width: 480px;
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px;
}

.modal-title {
  font-size: 16px;
  letter-spacing: 2px;
  margin-bottom: 16px;
  color: var(--accent);
}

/* Background */
.game-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: -1;
  background-size: cover;
  background-position: center;
  opacity: 0.15;
}

/* Loading */
.loading-spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 1px solid var(--text-dim);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 8px;
}

.typing-indicator span {
  width: 4px;
  height: 4px;
  background: var(--text-dim);
  border-radius: 50%;
  animation: typing 1.4s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { opacity: 0.3; }
  30% { opacity: 1; }
}

.hidden { display: none !important; }

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  padding: 10px 24px;
  font-size: 13px;
  z-index: 300;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* NPC Chat Panel */
#npcChatPanel {
  width: 420px;
}

#npcChatPanel .panel-body {
  padding: 0;
  display: flex;
  flex-direction: column;
}

/* Responsive */
@media (max-width: 768px) {
  .side-panel {
    width: 100%;
    right: -100%;
  }
  #npcChatPanel {
    width: 100%;
  }
}

.flavor-text {
  font-size: 12px;
  color: var(--text-dim);
  font-style: italic;
  margin: 4px 0;
}

.divider {
  border: none;
  border-top: 1px solid var(--border-color);
  margin: 16px 0;
}

.inline-flex {
  display: flex;
  align-items: center;
  gap: 8px;
}

.grow { flex: 1; }

.text-center { text-align: center; }
.text-dim { color: var(--text-dim); }
.text-accent { color: var(--accent); }
.text-sm { font-size: 12px; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mb-24 { margin-bottom: 24px; }
.p-16 { padding: 16px; }

.npc-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  font-size: 12px;
}

.npc-info-grid .info-item {
  padding: 4px 0;
}

.npc-info-grid .info-label {
  color: var(--text-dim);
}

.npc-info-grid .info-value {
  color: var(--text-secondary);
}

.npc-back-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  padding: 4px 8px;
}

.npc-back-btn:hover {
  color: var(--accent);
}
</style>
</head>
<body>

<div class="game-bg" id="gameBg"></div>

<!-- ===== Screen 1: API Configuration ===== -->
<div class="screen active" id="apiScreen">
  <div class="api-container">
    <div class="logo-section">
      <div class="logo-title">仙途情缘</div>
      <div class="logo-sub">文字修仙 · 恋爱物语</div>
    </div>

    <div class="form-group">
      <label class="form-label">API 接口地址</label>
      <input type="text" class="form-input" id="apiUrl" placeholder="https://api.openai.com/v1">
    </div>

    <div class="form-group">
      <label class="form-label">API 密钥</label>
      <input type="password" class="form-input" id="apiKey" placeholder="sk-...">
    </div>

    <div class="form-group">
      <label class="form-label">模型名称</label>
      <div class="inline-flex">
        <input type="text" class="form-input grow" id="modelName" placeholder="gpt-4o / claude-3.5-sonnet">

      </div>
      <div class="model-list hidden" id="modelList"></div>
    </div>

    <div class="form-group">
      <label class="form-label">配置名称</label>
      <input type="text" class="form-input" id="configName" placeholder="我的配置">

    <div class="btn-group">
      <button class="btn btn-primary" onclick="saveApiConfig()">保存配置</button>
      <button class="btn" onclick="testConnection()">测试连接</button>

    </div>

    <div class="saved-configs" id="savedConfigs">
      <div class="form-label">已保存的配置</div>
      <div id="configsList"></div>
    </div>
  </div>
</div>

<!-- ===== Screen 2: Character Creation ===== -->
<div class="screen" id="createScreen">

  document.querySelectorAll(`#${groupId} .radio-btn`).forEach(b => b.classList.remove('active'));

function randomTags(groupId) {
  const btns = document.querySelectorAll(`#${groupId} .tag-btn`);
  btns.forEach(b => b.classList.remove('active'));
  const count = Math.floor(Math.random() * 3) + 1;
  const indices = [];
  while (indices.length < count) {
    const i = Math.floor(Math.random() * btns.length);
    if (!indices.includes(i)) indices.push(i);
  }
  indices.forEach(i => btns[i].classList.add('active'));
}

function getFavorStage(favor) {
  if (favor <= -20) return '敌对';
  if (favor < 0) return '厌恶';
  if (favor <= 20) return '陌生';
  if (favor <= 40) return '熟识';
  if (favor <= 60) return '亲近';
  if (favor <= 80) return '暧昧';
  return '情定';
}

// ===== API =====
async function apiCall(messages, onStream) {
  const url = state.api.url.replace(/\/+$/, '') + '/chat/completions';
  const body = {
    model: state.api.model,
    messages: messages,
    temperature: 0.85,
    max_tokens: 2048,
    stream: true
  };

  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${state.api.key}`
      },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`API错误 ${resp.status}: ${err}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value, {stream: true});
      const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
      
      for (const line of lines) {
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;
        try {
          const json = JSON.parse(data);
          const delta = json.choices?.[0]?.delta?.content || '';
          if (delta) {
            fullText += delta;
            if (onStream) onStream(fullText);
          }
        } catch(e) {}
      }
    }

    return fullText;
  } catch(e) {
    // Fallback: try non-streaming
    try {
      body.stream = false;
      const resp = await fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.api.key}`
        },
        body: JSON.stringify(body)
      });
      if (!resp.ok) throw new Error('API请求失败');
      const json = await resp.json();
      const text = json.choices?.[0]?.message?.content || '';
      if (onStream) onStream(text);
      return text;
    } catch(e2) {
      throw new Error(`API调用失败: ${e.message}`);
    }
  }
}

async function fetchModels() {
  const url = state.api.url || $('apiUrl').value;
  const key = state.api.key || $('apiKey').value;
  
  if (!url || !key) {
    toast('请先填写API地址和密钥');
    return;
  }

  try {
    const resp = await fetch(url.replace(/\/+$/, '') + '/models', {
      headers: { 'Authorization': `Bearer ${key}` }
    });
    const json = await resp.json();
    const models = json.data || json.models || [];
    const list = $('modelList');
    list.innerHTML = '';
    list.classList.remove('hidden');
    
    models.forEach(m => {
      const id = m.id || m.name || m;
      const div = document.createElement('div');
      div.className = 'model-item';
      div.textContent = id;
      div.onclick = () => {
        $('modelName').value = id;
        document.querySelectorAll('.model-item').forEach(x => x.classList.remove('selected'));
        div.classList.add('selected');
      };
      list.appendChild(div);
    });
    
    if (models.length === 0) {
      list.innerHTML = '<div class="model-item text-dim">未找到模型</div>';
    }
  } catch(e) {
    toast('拉取模型失败: ' + e.message);
  }
}

async function testConnection() {
  const url = $('apiUrl').value;
  const key = $('apiKey').value;
  const model = $('modelName').value;
  
  if (!url || !key || !model) {
    toast('请填写完整的API配置');

  state.api = { ...state.api, url, key, model };

    toast('✓ 连接成功: ' + result.substring(0, 30));

}

function saveApiConfig() {
  const config = {
    name: $('configName').value || '未命名配置',
    url: $('apiUrl').value,
    key: $('apiKey').value,
    model: $('modelName').value,
    time: new Date().toLocaleString()
  };
  
  if (!config.url || !config.key) {
    toast('请填写API地址和密钥');
    return;
  }

  let configs = JSON.parse(localStorage.getItem('xiantu_configs') || '[]');
  const existIdx = configs.findIndex(c => c.name === config.name);
  if (existIdx >= 0) configs[existIdx] = config;
  else configs.push(config);
  
  localStorage.setItem('xiantu_configs', JSON.stringify(configs));
  loadConfigs();
  toast('配置已保存');
}

function loadConfigs() {
  const configs = JSON.parse(localStorage.getItem('xiantu_configs') || '[]');
  const list = $('configsList');
  list.innerHTML = '';
  
  configs.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'config-item';
    div.innerHTML = `
      <div>
        <div class="name">${c.name}</div>
        <div class="meta">${c.model} · ${c.time}</div>
      </div>
      <div class="btn-group">
        <button class="btn btn-sm" onclick="event.stopPropagation();loadConfig(${i})">加载</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteConfig(${i})">删</button>
      </div>
    `;
    list.appendChild(div);
  });
}

function loadConfig(idx) {
  const configs = JSON.parse(localStorage.getItem('xiantu_configs') || '[]');
  const c = configs[idx];
  if (!c) return;
  $('apiUrl').value = c.url;
  $('apiKey').value = c.key;
  $('modelName').value = c.model;
  $('configName').value = c.name;
  state.api = { ...state.api, url: c.url, key: c.key, model: c.model };
  toast('已加载: ' + c.name);
}

function deleteConfig(idx) {
  let configs = JSON.parse(localStorage.getItem('xiantu_configs') || '[]');
  configs.splice(idx, 1);
  localStorage.setItem('xiantu_configs', JSON.stringify(configs));
  loadConfigs();
}

function enterGame() {
  state.api.url = $('apiUrl').value;
  state.api.key = $('apiKey').value;
  state.api.model = $('modelName').value;
  
  if (!state.api.url || !state.api.key || !state.api.model) {
    toast('请完善API配置');
    return;
  }
  
  // Check if there's a saved game
  const saved = localStorage.getItem('xiantu_save');
  if (saved) {
    if (confirm('检测到存档，是否继续上次的游戏？')) {
      const data = JSON.parse(saved);
      Object.assign(state, data);
      state.api.url = $('apiUrl').value;
      state.api.key = $('apiKey').value;
      state.api.model = $('modelName').value;
      switchScreen('gameScreen');
      renderGame();
      return;
    }
  }
  
  switchScreen('createScreen');
}

async function startGame() {

  const userMsg = {role: 'user', content: '游戏开始。请描述主角所在的初始场景，引入第一个事件或遭遇。根据主角的出身背景来设定开场。提供2-4个选项供玩家选择。'};
  
  state.conversationHistory = [systemMsg, userMsg];

}

async function generateResponse() {
  const storyArea = $('storyArea');
  const entryDiv = document.createElement('div');
  entryDiv.className = 'story-entry';
  entryDiv.innerHTML = '<div class="story-narration"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';

  const narration = entryDiv.querySelector('.story-narration');
  
  try {
    const fullText = await apiCall(state.conversationHistory, (partial) => {
      const {narrative} = parseResponse(partial);
      narration.innerHTML = formatNarrative(narrative);
      storyArea.scrollTop = storyArea.scrollHeight;
    });
    
    state.conversationHistory.push({role: 'assistant', content: fullText});
    
    const {narrative, choices, updates} = parseResponse(fullText);
    
    narration.innerHTML = formatNarrative(narrative);
    
    // Add entry actions
    const entryIndex = state.storyHistory.length;
const actionsHtml = `
  <div class="story-entry-actions">
    <button class="entry-action-btn" onclick="rewriteFromHere(this, ${entryIndex})">↻ 重写</button>
    <button class="entry-action-btn" onclick="rollbackToHere(this, ${entryIndex})">← 回溯至此</button>
    <button class="entry-action-btn" onclick="deleteEntry(this)">✕ 删除</button>
  </div>
`;
    narration.insertAdjacentHTML('afterend', actionsHtml);
// 双击编辑
narration.addEventListener('dblclick', function() {
  startInlineEdit(this, entryIndex);
});
narration.style.cursor = 'pointer';
narration.title = '双击可编辑重写';
    
    // Process updates
    if (updates) processUpdates(updates);
    
    // Show choices
    renderChoices(choices);
    
    storyArea.scrollTop = storyArea.scrollHeight;
    
    state.storyHistory.push({content: fullText, type: 'narration'});
    autoSave();
    
  } catch(e) {
    narration.innerHTML = `<span style="color:var(--danger)">生成失败: ${e.message}</span><br><button class="btn btn-sm mt-8" onclick="retryGeneration()">重试</button>`;
  }
}

function parseResponse(text) {
  let narrative = text;
  let choices = [];
  let updates = null;
  
  // Extract choices
  const choiceMatch = text.match(/---CHOICES---\n?([\s\S]*?)---END---/);
  if (choiceMatch) {
    narrative = text.replace(/---CHOICES---[\s\S]*?---END---/, '').trim();
    const choiceLines = choiceMatch[1].trim().split('\n').filter(l => l.trim());
    choices = choiceLines.map(l => l.replace(/^\d+[\.\、\)]\s*/, '').trim());
  }
  
  // Extract updates
  const updateMatch = text.match(/---UPDATES---\n?([\s\S]*?)---END_UPDATES---/);
  if (updateMatch) {
    narrative = narrative.replace(/---UPDATES---[\s\S]*?---END_UPDATES---/, '').trim();
    updates = updateMatch[1].trim();
  }
  
  return {narrative, choices, updates};
}

function formatNarrative(text) {
  // Format NPC dialogue
  text = text.replace(/【(.+?)】[:：]\s*["""](.+?)["""]/g, '<div class="story-dialogue"><div class="speaker">$1</div>$2</div>');
  text = text.replace(/【(.+?)】[:：]\s*(.+?)(?=\n|$)/g, '<div class="story-dialogue"><div class="speaker">$1</div>$2</div>');
  
  // Format paragraphs
  const paragraphs = text.split('\n').filter(p => p.trim());
  return paragraphs.map(p => {
    if (p.includes('story-dialogue')) return p;
    return `<p style="margin-bottom:12px;text-indent:2em;">${p.trim()}</p>`;
  }).join('');
}

function processUpdates(updateText) {
  const lines = updateText.split('\n').filter(l => l.trim());
  lines.forEach(line => {
    const parts = line.split(':');
    if (parts[0] === 'favor' && parts.length >= 3) {
      const npcId = parts[1];
      const change = parseInt(parts[2]);
      const npc = state.npcs.find(n => n.id === npcId);
      if (npc && !isNaN(change)) {
        npc.favor = Math.max(-50, Math.min(100, npc.favor + change));
        npc.relationship = getFavorStage(npc.favor);
        if (change > 0) toast(`${npc.name} 好感度 +${change}`);
        else if (change < 0) toast(`${npc.name} 好感度 ${change}`);
      }
    } else if (parts[0] === 'stat' && parts.length >= 3) {
      const stat = parts[1];
      const val = parts[2];
      if (state.player[stat] !== undefined) {
        state.player[stat] = isNaN(val) ? val : parseInt(val);
      }
    } else if (parts[0] === 'realm') {
      state.player.realm = parts.slice(1).join(':');
      renderGameHeader();
      toast(`突破！当前境界：${state.player.realm}`);
    } else if (parts[0] === 'event') {
      addStoryEntry('system', parts.slice(1).join(':'));
    }
  });
}

function renderChoices(choices) {

  toggleBtn.textContent = '▼ 收起选项';

// ===== STORY ACTIONS =====
async function rewriteLastEntry() {
  if (state.conversationHistory.length < 2) return;
  // Remove last AI response
  const lastAssistant = state.conversationHistory.findLastIndex(m => m.role === 'assistant');
  if (lastAssistant >= 0) {
    state.conversationHistory.splice(lastAssistant, 1);
    // Remove last story entry from DOM
    const entries = $('storyArea').querySelectorAll('.story-entry');
    if (entries.length > 0) entries[entries.length - 1].remove();
    state.storyHistory.pop();
    await generateResponse();
  }
}

function rollbackEntry() {
  if (state.conversationHistory.length < 3) return;
  // Remove last exchange (user + assistant)
  const entries = $('storyArea').querySelectorAll('.story-entry');
  // Remove last 2 entries from DOM
  for (let i = 0; i < 2 && entries.length - 1 - i >= 0; i++) {
    entries[entries.length - 1 - i].remove();
  }
  // Remove from conversation
  while (state.conversationHistory.length > 1 && state.conversationHistory[state.conversationHistory.length-1].role !== 'system') {
    const removed = state.conversationHistory.pop();
    if (removed.role === 'user') break;
  }
  state.storyHistory.pop();
  toast('已回溯一步');
  autoSave();
}

function deleteLastEntry() {
  const entries = $('storyArea').querySelectorAll('.story-entry');
  if (entries.length > 0) {
    entries[entries.length - 1].remove();
    if (state.conversationHistory.length > 1) {
      state.conversationHistory.pop();
    }
    toast('已删除');
    autoSave();
  }
}

function rewriteEntry(btn) {
  // Rewrite this specific entry
  rewriteLastEntry();
}

function deleteEntry(btn) {
  const entry = btn.closest('.story-entry');
  if (entry) entry.remove();
}

async function retryGeneration() {
  const entries = $('storyArea').querySelectorAll('.story-entry');
  if (entries.length > 0) entries[entries.length - 1].remove();
  await generateResponse();
}

// ===== 双击编辑（内联重写+保存）=====
function startInlineEdit(narrationEl, entryIndex) {
  const currentHtml = narrationEl.innerHTML;
  // 把HTML转回纯文本用于编辑
  const tempDiv = document.createElement('div');
  tempDiv.innerHTML = currentHtml;
  const currentText = tempDiv.innerText;
  
  const entryDiv = narrationEl.closest('.story-entry');
  // 隐藏操作按钮
  const actions = entryDiv.querySelector('.story-entry-actions');
  if (actions) actions.style.display = 'none';
  
  narrationEl.innerHTML = `
    <textarea class="edit-textarea">${currentText}</textarea>
    <div class="edit-actions">
      <button class="btn btn-sm" onclick="cancelInlineEdit(this, \`${encodeURIComponent(currentHtml)}\`)">取消</button>
      <button class="btn btn-sm btn-primary" onclick="saveInlineEdit(this, ${entryIndex})">保存</button>
    </div>
  `;
}

function saveInlineEdit(btn, entryIndex) {
  const narrationEl = btn.closest('.story-narration');
  const textarea = narrationEl.querySelector('.edit-textarea');
  const newText = textarea.value;
  
  // 更新显示
  narrationEl.innerHTML = formatNarrative(newText);
  
  // 恢复操作按钮
  const entryDiv = narrationEl.closest('.story-entry');
  const actions = entryDiv.querySelector('.story-entry-actions');
  if (actions) actions.style.display = 'flex';
  
  // 重新绑定双击
  narrationEl.addEventListener('dblclick', function() {
    startInlineEdit(this, entryIndex);
  });
  
  // 更新 state 中的记录
  if (state.storyHistory[entryIndex]) {
    state.storyHistory[entryIndex].content = newText;
  }
  
  // 同步更新 conversationHistory 中对应的 assistant 消息
  let assistantCount = 0;
  for (let i = 0; i < state.conversationHistory.length; i++) {
    if (state.conversationHistory[i].role === 'assistant') {
      if (assistantCount === entryIndex - 1) { // -1 因为第一条是system entry
        state.conversationHistory[i].content = newText;
        break;
      }
      assistantCount++;
    }
  }
  
  autoSave();
  toast('已保存修改');
}

function cancelInlineEdit(btn, encodedHtml) {
  const narrationEl = btn.closest('.story-narration');
  narrationEl.innerHTML = decodeURIComponent(encodedHtml);
  
  const entryDiv = narrationEl.closest('.story-entry');
  const actions = entryDiv.querySelector('.story-entry-actions');
  if (actions) actions.style.display = 'flex';
}

// ===== 回溯到指定位置 =====
function rollbackToHere(btn, entryIndex) {
  if (!confirm('回溯到此处？此操作之后的内容将被删除。')) return;
  
  const storyArea = $('storyArea');
  const entries = storyArea.querySelectorAll('.story-entry');
  
  // 删除此条之后的所有DOM条目
  for (let i = entries.length - 1; i >= entryIndex; i--) {
    entries[i].remove();
  }
  
  // 裁剪 storyHistory
  state.storyHistory = state.storyHistory.slice(0, entryIndex);
  
  // 裁剪 conversationHistory：保留 system + 对应数量的消息
  // 重建 conversationHistory
  let keepCount = 0;
  let newConv = [];
  for (let i = 0; i < state.conversationHistory.length; i++) {
    newConv.push(state.conversationHistory[i]);
    if (state.conversationHistory[i].role === 'assistant') {
      keepCount++;
      if (keepCount >= entryIndex) break;
    }
  }
  state.conversationHistory = newConv;
  
  // 恢复该位置的选项
  if (entryIndex > 0 && state.storyHistory.length > 0) {
    const lastEntry = state.storyHistory[state.storyHistory.length - 1];
    const { choices } = parseResponse(lastEntry.content);
    renderChoices(choices);
  } else {
    $('choicesArea').innerHTML = '';
  }
  
  autoSave();
  toast('已回溯至此');
}

// ===== 从此处重写 =====
function rewriteFromHere(btn, entryIndex) {
  const storyArea = $('storyArea');
  const entries = storyArea.querySelectorAll('.story-entry');
  
  // 删除此条及之后的DOM
  for (let i = entries.length - 1; i >= entryIndex; i--) {
    entries[i].remove();
  }
  
  // 裁剪历史
  state.storyHistory = state.storyHistory.slice(0, entryIndex);
  
  let keepCount = 0;
  let newConv = [];
  for (let i = 0; i < state.conversationHistory.length; i++) {
    newConv.push(state.conversationHistory[i]);
    if (state.conversationHistory[i].role === 'assistant') {
      keepCount++;
      if (keepCount >= entryIndex) break;
    }
  }
  // 去掉最后一条 assistant（因为要重写它）
  if (newConv.length > 0 && newConv[newConv.length - 1].role === 'assistant') {
    newConv.pop();
  }
  state.conversationHistory = newConv;
  
  generateResponse();
}

function handleNpcAvatarUpload(event, npcId) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const npc = state.npcs.find(n => n.id === npcId);

      npc.avatar = e.target.result;
      openNpcChat(npcId); // Refresh
      toast('头像已更新');
    }
  };
  reader.readAsDataURL(file);
}

function renderNpcChatMessages(npcId) {
  const area = $('npcChatMessages');
  area.innerHTML = '';
  
  const messages = state.npcChats[npcId] || [];
  const npc = state.npcs.find(n => n.id === npcId);
  
  if (messages.length === 0) {
    area.innerHTML = `<div class="text-center text-dim text-sm p-16">尚无对话记录<br>向${npc.name}发送消息开启交流</div>`;
    return;
  }
  
  messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = `chat-msg ${msg.role === 'user' ? 'from-player' : 'from-npc'}`;
    
    const avatarSrc = msg.role === 'user' 
      ? (state.player?.avatar || '') 
      : (npc?.avatar || '');
    
    const avatarHtml = avatarSrc
      ? `<div class="chat-avatar-sm"><img src="${avatarSrc}"></div>`
      : `<div class="chat-avatar-sm" style="display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-dim)">${msg.role === 'user' ? '我' : npc.name[0]}</div>`;
    
    div.innerHTML = `

      <div class="chat-bubble">${msg.content}</div>
    `;
    area.appendChild(div);
  });

async function sendNpcChat() {
  const input = $('npcChatInput');
  const text = input.value.trim();
  if (!text || !state.currentNpc) return;
  
  input.value = '';
  const npcId = state.currentNpc;
  
  if (!state.npcChats[npcId]) state.npcChats[npcId] = [];
  state.npcChats[npcId].push({role: 'user', content: text});
  renderNpcChatMessages(npcId);
  
  // Build messages for API
  const systemPrompt = getNpcChatPrompt(npcId);
  const chatHistory = state.npcChats[npcId].map(m => ({
    role: m.role === 'user' ? 'user' : 'assistant',
    content: m.content
  }));
  
  const messages = [
    {role: 'system', content: systemPrompt},
    ...chatHistory
  ];
  
  // Add typing indicator
  const area = $('npcChatMessages');
  const typingDiv = document.createElement('div');
  typingDiv.className = 'chat-msg from-npc';
  typingDiv.id = 'npcTyping';
  typingDiv.innerHTML = `<div class="chat-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  area.appendChild(typingDiv);
  area.scrollTop = area.scrollHeight;
  
  try {
    let fullText = await apiCall(messages, (partial) => {
      const cleanText = partial.replace(/---NPC_UPDATE---[\s\S]*?---END_NPC_UPDATE---/g, '').trim();
      const typing = $('npcTyping');
      if (typing) {
        typing.querySelector('.chat-bubble').innerHTML = cleanText;
        area.scrollTop = area.scrollHeight;
      }
    });
    
    // Process NPC updates
    const updateMatch = fullText.match(/---NPC_UPDATE---\n?([\s\S]*?)---END_NPC_UPDATE---/);
    if (updateMatch) {
      const lines = updateMatch[1].trim().split('\n');
      lines.forEach(line => {
        if (line.startsWith('favor_change:')) {
          const parts = line.split(':');
          const change = parseInt(parts[1]);
          const npc = state.npcs.find(n => n.id === npcId);
          if (npc && !isNaN(change)) {
            npc.favor = Math.max(-50, Math.min(100, npc.favor + change));
            npc.relationship = getFavorStage(npc.favor);
            if (change !== 0) toast(`${npc.name} 好感度 ${change > 0 ? '+' : ''}${change}`);
          }
        }
      });
    }
    
    const cleanText = fullText.replace(/---NPC_UPDATE---[\s\S]*?---END_NPC_UPDATE---/g, '').trim();
    
    // Remove typing indicator and add message
    const typing = $('npcTyping');
    if (typing) typing.remove();
    
    state.npcChats[npcId].push({role: 'assistant', content: cleanText});
    renderNpcChatMessages(npcId);
    autoSave();
    
  } catch(e) {
    const typing = $('npcTyping');
    if (typing) typing.remove();
    toast('对话生成失败: ' + e.message);
  }
}

function rewriteLastNpcMsg() {
  if (!state.currentNpc) return;
  const msgs = state.npcChats[state.currentNpc];
  if (!msgs || msgs.length === 0) return;
  
  // Remove last assistant message
  if (msgs[msgs.length - 1].role === 'assistant') {
    msgs.pop();
    renderNpcChatMessages(state.currentNpc);
    // Re-generate
    // We need to re-send the last user message
    sendNpcChat_regenerate();
  }
}

function deleteLastNpcMsg() {
  if (!state.currentNpc) return;
  const msgs = state.npcChats[state.currentNpc];
  if (msgs && msgs.length > 0) {
    msgs.pop();
    renderNpcChatMessages(state.currentNpc);
    toast('已删除');
  }
}

function restartNpcChat() {
  if (!state.currentNpc) return;
  if (!confirm('确定要重置与该NPC的对话记录吗？')) return;
  state.npcChats[state.currentNpc] = [];
  renderNpcChatMessages(state.currentNpc);
  toast('对话已重置');
}

function backToNpcList() {
  closePanel('npcChatPanel');
  setTimeout(() => togglePanel('npcPanel'), 100);
}

// ===== PANEL MANAGEMENT =====
function togglePanel(panelId) {
  closeAllPanels();
  setTimeout(() => {
    $(panelId).classList.add('open');
    $('panelOverlay').classList.add('open');
    
    if (panelId === 'statusPanel') renderStatusPanel();
    if (panelId === 'npcPanel') renderNpcList();
  }, 50);
}

function closePanel(panelId) {
  $(panelId).classList.remove('open');
  $('panelOverlay').classList.remove('open');
}

function closeAllPanels() {
  document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('open'));
  $('panelOverlay').classList.remove('open');
}

// ===== STATUS PANEL =====
function renderStatusPanel() {
  const p = state.player;
  if (!p) return;
  
  $('statusBody').innerHTML = `
    <div class="text-center mb-24">
      <div class="avatar-upload" style="cursor:default;margin:0 auto;">
        <img src="${p.avatar}" onerror="this.style.display='none'">
      </div>
    </div>
    
    <div class="status-section">
      <h4>基 础 信 息</h4>
      <div class="stat-row"><span class="stat-label">姓名</span><span class="stat-value">${p.name}</span></div>
      <div class="stat-row"><span class="stat-label">性别</span><span class="stat-value">${p.gender}</span></div>
      <div class="stat-row"><span class="stat-label">年龄</span><span class="stat-value">${p.age}</span></div>
      <div class="stat-row"><span class="stat-label">寿元</span><span class="stat-value">${p.lifespan}/${p.maxLifespan}</span></div>
      <div class="stat-row"><span class="stat-label">性取向</span><span class="stat-value">${p.orientation}</span></div>
      <div class="stat-row"><span class="stat-label">偏好</span><span class="stat-value">${p.preference}</span></div>
    </div>
    
    <div class="status-section">
      <h4>修 炼 信 息</h4>
      <div class="stat-row"><span class="stat-label">境界</span><span class="stat-value text-accent">${p.realm}</span></div>
      <div class="stat-row"><span class="stat-label">灵根</span><span class="stat-value">${p.roots.join('·')}（${p.rootQuality}）</span></div>
      <div class="stat-row"><span class="stat-label">功法</span><span class="stat-value">${p.techniques.length > 0 ? p.techniques.join('、') : '无'}</span></div>
      <div class="stat-row"><span class="stat-label">法器</span><span class="stat-value">${p.artifacts.length > 0 ? p.artifacts.join('、') : '无'}</span></div>
      <div class="stat-row"><span class="stat-label">物品</span><span class="stat-value">${p.inventory.length > 0 ? p.inventory.join('、') : '无'}</span></div>
    </div>
    
    <div class="status-section">
      <h4>核 心 数 值</h4>
      <div class="bar-stat">
        <div class="bar-label"><span class="name">道心</span><span class="val">${p.daoHeart}/100</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${p.daoHeart}%"></div></div>
      </div>
      <div class="bar-stat">
        <div class="bar-label"><span class="name">神识</span><span class="val">${p.spirit}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(p.spirit, 100)}%"></div></div>
      </div>
      <div class="bar-stat">
        <div class="bar-label"><span class="name">体魄</span><span class="val">${p.body}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(p.body, 100)}%"></div></div>
      </div>
      <div class="bar-stat">
        <div class="bar-label"><span class="name">悟性</span><span class="val">${p.comprehension}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(p.comprehension, 100)}%"></div></div>
      </div>
      <div class="bar-stat">
        <div class="bar-label"><span class="name">气运</span><span class="val">${p.luck}</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.min(p.luck, 100)}%;background:${p.luck > 50 ? 'var(--success)' : 'var(--danger)'}"></div></div>
      </div>
    </div>
    
    <div class="status-section">
      <h4>好 感 一 览</h4>
      ${state.npcs.map(n => `
        <div class="stat-row">
          <span class="stat-label">${n.name}</span>
          <span class="stat-value">${n.favor}（${getFavorStage(n.favor)}）</span>
        </div>
      `).join('')}
    </div>
  `;
}

// ===== GAME HEADER =====
function renderGameHeader() {
  if (!state.player) return;
  $('gameHeaderName').textContent = state.player.name;
  $('gameHeaderRealm').textContent = state.player.realm;
  $('gameHeaderAvatar').src = state.player.avatar;
}

function renderGame() {
  renderGameHeader();
  // Re-render story from history
  const storyArea = $('storyArea');
  storyArea.innerHTML = '';
  
  state.storyHistory.forEach(entry => {
    const div = document.createElement('div');
    div.className = 'story-entry';
    
    if (entry.type === 'system') {
      div.innerHTML = `<div class="story-system">${entry.content}</div>`;
    } else if (entry.type === 'player') {
      div.innerHTML = `
        <div style="text-align:right;padding:8px 0;">
          <span style="display:inline-block;padding:8px 16px;border:1px solid var(--accent-dim);font-size:13px;color:var(--accent);max-width:80%;">${entry.content}</span>
        </div>
      `;
    } else {
      const {narrative, choices} = parseResponse(entry.content);
      div.innerHTML = `<div class="story-narration">${formatNarrative(narrative)}</div>`;
      // Show choices for last entry
    }
    
    storyArea.appendChild(div);
  });
  
  // Show choices for last entry if any
  if (state.storyHistory.length > 0) {
    const last = state.storyHistory[state.storyHistory.length - 1];
    const {choices} = parseResponse(last.content);
    renderChoices(choices);
  }
  
  if (state.settings.bgUrl) {
    $('gameBg').style.backgroundImage = `url(${state.settings.bgUrl})`;
  }
}

// ===== SAVE / LOAD =====
function autoSave() {
  try {
    const saveData = {
      player: state.player,
      npcs: state.npcs,
      storyHistory: state.storyHistory.slice(-50), // Keep last 50 entries
      conversationHistory: state.conversationHistory.slice(-30),
      npcChats: state.npcChats,
      settings: state.settings
    };
    localStorage.setItem('xiantu_save', JSON.stringify(saveData));
  } catch(e) {
    console.warn('Auto-save failed:', e);
  }
}

function exportSave() {
  const saveData = {
    player: state.player,
    npcs: state.npcs,
    storyHistory: state.storyHistory,
    conversationHistory: state.conversationHistory,
    npcChats: state.npcChats,
    settings: state.settings,
    exportTime: new Date().toISOString()
  };
  
  const blob = new Blob([JSON.stringify(saveData, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `仙途情缘_${state.player?.name || '存档'}_${new Date().toLocaleDateString()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('存档已导出');
}

function importSave(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.player) {
        state.player = data.player;
        state.npcs = data.npcs || NPC_TEMPLATES;
        state.storyHistory = data.storyHistory || [];
        state.conversationHistory = data.conversationHistory || [];
        state.npcChats = data.npcChats || {};
        state.settings = data.settings || state.settings;
        
        switchScreen('gameScreen');
        renderGame();
        toast('存档已导入');
      } else {
        toast('无效的存档文件');
      }
    } catch(err) {
      toast('导入失败: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function restartGame() {
  if (!confirm('确定要重启游戏吗？所有进度将丢失！')) return;
  localStorage.removeItem('xiantu_save');
  state = {
    api: state.api,
    player: null,
    npcs: [],
    storyHistory: [],
    conversationHistory: [],
    npcChats: {},
    settings: { style: '古风雅致', bgUrl: '' },
    currentNpc: null
  };
  $('storyArea').innerHTML = '';
  $('choicesArea').innerHTML = '';
  closeAllPanels();
  switchScreen('createScreen');
  showCreateStep(1);
  toast('游戏已重启');
}

function updateStyle() {
  state.settings.style = $('settingStyle').value;
  autoSave();
  toast('语言风格已更新');
}

// ===== 多存档管理 =====
function openSaveManager() {
  closeAllPanels();
  renderSaveSlots();
  $('saveManagerModal').classList.add('open');
}

function closeSaveManager() {
  $('saveManagerModal').classList.remove('open');
}

function saveToSlot() {
  const name = $('saveSlotName').value.trim();
  if (!name) { toast('请输入存档名称'); return; }
  
  const saveData = {
    name: name,
    time: new Date().toLocaleString(),
    playerName: state.player?.name || '未知',
    realm: state.player?.realm || '未知',
    player: state.player,
    npcs: state.npcs,
    storyHistory: state.storyHistory,
    conversationHistory: state.conversationHistory,
    npcChats: state.npcChats,
    settings: state.settings
  };
  
  let slots = JSON.parse(localStorage.getItem('xiantu_slots') || '[]');
  
  // 同名覆盖
  const existIdx = slots.findIndex(s => s.name === name);
  if (existIdx >= 0) {
    if (!confirm(`存档"${name}"已存在，是否覆盖？`)) return;
    slots[existIdx] = saveData;
  } else {
    slots.push(saveData);
  }
  
  localStorage.setItem('xiantu_slots', JSON.stringify(slots));
  $('saveSlotName').value = '';
  renderSaveSlots();
  toast('存档已保存: ' + name);
}

function renderSaveSlots() {
  const slots = JSON.parse(localStorage.getItem('xiantu_slots') || '[]');
  const list = $('saveSlotsList');
  
  if (slots.length === 0) {
    list.innerHTML = '<div class="text-sm text-dim">暂无存档</div>';
    return;
  }
  
  list.innerHTML = slots.map((s, i) => `
    <div class="config-item">
      <div>
        <div class="name">${s.name}</div>
        <div class="meta">${s.playerName} · ${s.realm} · ${s.time}</div>
      </div>
      <div class="btn-group">
        <button class="btn btn-sm" onclick="loadSlot(${i})">读取</button>
        <button class="btn btn-sm btn-danger" onclick="deleteSlot(${i})">删</button>
      </div>
    </div>
  `).join('');
}

function loadSlot(idx) {
  const slots = JSON.parse(localStorage.getItem('xiantu_slots') || '[]');
  const data = slots[idx];
  if (!data) return;
  
  if (!confirm(`确定读取存档"${data.name}"？当前未保存的进度将丢失。`)) return;
  
  state.player = data.player;
  state.npcs = data.npcs || [];
  state.storyHistory = data.storyHistory || [];
  state.conversationHistory = data.conversationHistory || [];
  state.npcChats = data.npcChats || {};
  state.settings = data.settings || state.settings;
  
  closeSaveManager();
  switchScreen('gameScreen');
  renderGame();
  toast('已读取存档: ' + data.name);
}

function deleteSlot(idx) {
  let slots = JSON.parse(localStorage.getItem('xiantu_slots') || '[]');
  const name = slots[idx]?.name;
  if (!confirm(`确定删除存档"${name}"？`)) return;
  slots.splice(idx, 1);
  localStorage.setItem('xiantu_slots', JSON.stringify(slots));
  renderSaveSlots();
  toast('已删除');
}

// ===== INIT =====
window.onload = function() {
  loadConfigs();
  
  // Restore API config if exists
  const configs = JSON.parse(localStorage.getItem('xiantu_configs') || '[]');
  if (configs.length > 0) {
    const last = configs[configs.length - 1];
    $('apiUrl').value = last.url;
    $('apiKey').value = last.key;
    $('modelName').value = last.model;
    $('configName').value = last.name;
    state.api = { ...state.api, url: last.url, key: last.key, model: last.model };
  }
};
</script>
